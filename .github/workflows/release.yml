name: Release

on:
  push:
    branches:
      - main

# Prevent concurrent release runs that might conflict on commits/tags
concurrency: ${{ github.workflow }}-${{ github.ref }}

env:
  # Enable npm publishing by setting this to 'true' (requires NPM_TOKEN secret)
  PUBLISH_TO_NPM: 'false'

jobs:
  release:
    name: Release Pipeline
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for changelog and tag updates

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Lint
        run: pnpm lint

      - name: Run Typecheck
        run: pnpm type-check

      - name: Run Tests
        run: pnpm test run

      - name: Run Build
        run: pnpm build

      - name: Version Packages and Generate Notes
        id: version
        run: |
          # Set git config for committing version bump
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Run the version bump script (consumes changesets, bumps package.json, writes CHANGELOG.md & RELEASE_NOTES.md)
          pnpm version:bump
          
          # Check if changes were actually made (i.e. changesets existed and package.json was modified)
          if git diff --quiet package.json; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changesets to release."
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            
            # Read new version from package.json
            VERSION=$(node -p "require('./package.json').version")
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            
            # Commit and push version bump to main
            git add package.json CHANGELOG.md
            git commit -m "chore(release): v$VERSION [skip ci]"
            git push origin main
          fi

      - name: Create GitHub Release
        if: steps.version.outputs.has_changes == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body_path: .github/RELEASE_NOTES.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm
        if: steps.version.outputs.has_changes == 'true' && env.PUBLISH_TO_NPM == 'true'
        run: |
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc
          pnpm changeset publish
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
