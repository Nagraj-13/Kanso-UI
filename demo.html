<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vengeance UI - Steady Layered Ecosystem</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap');

    :root {
      --bg: #030303;
      --surface-dark: #0a0a0c;
      --border: rgba(255, 255, 255, 0.1);
      --border-highlight: rgba(255, 255, 255, 0.25);
      
      /* VoidZero / Vengeance Palette */
      --accent-main: #646cff;    /* Vite Purple */
      --accent-glow: rgba(100, 108, 255, 0.5);
      --accent-green: #42b883;   /* Vue Green */
      --accent-green-glow: rgba(66, 184, 131, 0.5);
      --accent-cyan: #00d8ff;    /* React Cyan */
      --accent-cyan-glow: rgba(0, 216, 255, 0.5);
      
      --text-main: #ffffff;
      --text-muted: #888890;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background-color: var(--bg);
      font-family: 'Inter', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      perspective: 1500px;
    }

    /* Ambient background lighting */
    .ambient-light {
      position: absolute;
      width: 100vw; height: 100vh;
      background: radial-gradient(circle at 50% 50%, rgba(100, 108, 255, 0.05), transparent 60%);
      pointer-events: none;
    }

    .scene {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      transform-style: preserve-3d;
      pointer-events: none; /* Let components handle hovers exclusively */
    }

    .isometric-grid {
      position: relative;
      width: 600px;
      height: 600px;
      transform-style: preserve-3d;
      transform: rotateX(60deg) rotateZ(-45deg);
    }

    .floor {
      position: absolute;
      inset: -200px;
      border: 1px solid rgba(255, 255, 255, 0.03);
      background-image: 
        linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      transform: translateZ(-20px);
      box-shadow: inset 0 0 100px 100px var(--bg);
      pointer-events: none;
    }

    /* Base Component Structure */
    .component {
      position: absolute;
      transform-style: preserve-3d;
      cursor: pointer;
      pointer-events: auto; /* Ensure components catch the mouse */
    }

    /* Positioning the 3 interconnected components */
    .comp-main { top: 250px; left: 250px; width: 200px; height: 200px; }
    .comp-node-1 { top: 40px; left: 280px; width: 140px; height: 140px; }
    .comp-node-2 { top: 280px; left: 40px; width: 140px; height: 140px; }

    /* Connecting Lines */
    .connection {
      position: absolute;
      background: var(--border-highlight);
      box-shadow: 0 0 10px var(--accent-glow);
      transform: translateZ(5px);
      pointer-events: none; /* FIX: Prevents lines from stealing the hover event from comp-node-2 */
    }
    .conn-1 { top: 110px; left: 350px; width: 4px; height: 140px; }
    .conn-2 { top: 350px; left: 110px; width: 140px; height: 4px; }

    /* Component Layers */
    .layer {
      position: absolute;
      inset: 0;
      border-radius: 16px;
      transition: all 0.7s cubic-bezier(0.16, 1, 0.3, 1);
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      transform-style: preserve-3d;
    }

    .layer-base {
      background: var(--surface-dark);
      border: 1px solid var(--border);
      transform: translateZ(0px);
      box-shadow: 20px 20px 40px rgba(0, 0, 0, 0.9);
    }

    .layer-core {
      background: rgba(5, 5, 5, 0.9);
      border: 1px solid var(--border);
      transform: translateZ(10px); 
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .layer-glass {
      background: rgba(12, 12, 14, 0.92); 
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      transform: translateZ(20px); 
      box-shadow: inset 0 0 30px rgba(255,255,255,0.02);
    }

    .layer-ui {
      background: transparent;
      border: 1px solid var(--border-highlight);
      transform: translateZ(30px); 
      padding: 20px;
      pointer-events: none; 
    }

    /* --- EXPLODED VIEW ON HOVER --- */
    
    .comp-main:hover .layer-base { transform: translateZ(0px); box-shadow: 30px 30px 60px rgba(0,0,0,1); }
    .comp-main:hover .layer-core { transform: translateZ(50px); box-shadow: 0 10px 40px var(--accent-glow); border-color: var(--accent-main); }
    .comp-main:hover .layer-glass { transform: translateZ(100px); background: rgba(12, 12, 14, 0.4); border-color: rgba(255,255,255,0.3); }
    .comp-main:hover .layer-ui { transform: translateZ(150px); }

    .comp-node-1:hover .layer-core { transform: translateZ(40px); box-shadow: 0 10px 40px var(--accent-green-glow); border-color: var(--accent-green); }
    .comp-node-1:hover .layer-glass { transform: translateZ(80px); background: rgba(12, 12, 14, 0.4); }
    .comp-node-1:hover .layer-ui { transform: translateZ(120px); }

    .comp-node-2:hover .layer-core { transform: translateZ(40px); box-shadow: 0 10px 40px var(--accent-cyan-glow); border-color: var(--accent-cyan); }
    .comp-node-2:hover .layer-glass { transform: translateZ(80px); background: rgba(12, 12, 14, 0.4); }
    .comp-node-2:hover .layer-ui { transform: translateZ(120px); }


    /* --- TYPOGRAPHY & UI ELEMENTS --- */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .title {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text-main);
      margin: 0;
      text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    }

    .badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem;
      padding: 4px 8px;
      border-radius: 4px;
      background: rgba(255,255,255,0.1);
      color: var(--text-main);
    }

    .badge.main { color: var(--accent-main); background: rgba(100, 108, 255, 0.15); }
    .badge.green { color: var(--accent-green); background: rgba(66, 184, 131, 0.15); }
    .badge.cyan { color: var(--accent-cyan); background: rgba(0, 216, 255, 0.15); }

    .desc {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin: 0 0 auto 0;
      line-height: 1.4;
    }

    .metrics {
      display: flex;
      gap: 16px;
      margin-top: auto;
      border-top: 1px solid rgba(255,255,255,0.1);
      padding-top: 12px;
    }

    .metric {
      display: flex;
      flex-direction: column;
    }

    .metric-val {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9rem;
      color: var(--text-main);
    }

    .metric-label {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
    }

    /* Core Graphics (SVGs) */
    .core-svg {
      width: 60%;
      height: 60%;
      opacity: 0.8;
    }
    .comp-main .core-svg { color: var(--accent-main); filter: drop-shadow(0 0 10px var(--accent-glow)); }
    .comp-node-1 .core-svg { color: var(--accent-green); filter: drop-shadow(0 0 10px var(--accent-green-glow)); }
    .comp-node-2 .core-svg { color: var(--accent-cyan); filter: drop-shadow(0 0 10px var(--accent-cyan-glow)); }

  </style>
</head>
<body>

  <div class="ambient-light"></div>

  <div class="scene" id="scene">
    <div class="isometric-grid">
      
      <div class="floor"></div>

      <div class="connection conn-1"></div>
      <div class="connection conn-2"></div>

      <div class="component comp-main">
        <div class="layer layer-base"></div>
        <div class="layer layer-core">
          <svg class="core-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
            <polyline points="2 17 12 22 22 17"></polyline>
            <polyline points="2 12 12 17 22 12"></polyline>
            <circle cx="12" cy="12" r="3" fill="currentColor"></circle>
          </svg>
        </div>
        <div class="layer layer-glass"></div>
        <div class="layer layer-ui">
          <div class="header">
            <h2 class="title">VoidCore</h2>
            <span class="badge main">v2.4.0</span>
          </div>
          <p class="desc">Primary compiler engine. Rust-based infrastructure.</p>
          <div class="metrics">
            <div class="metric"><span class="metric-val">0.4ms</span><span class="metric-label">Build</span></div>
            <div class="metric"><span class="metric-val">12GB/s</span><span class="metric-label">I/O</span></div>
          </div>
        </div>
      </div>

      <div class="component comp-node-1">
        <div class="layer layer-base"></div>
        <div class="layer layer-core">
          <svg class="core-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <ellipse cx="12" cy="5" rx="9" ry="3"></ellipse>
            <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"></path>
            <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"></path>
          </svg>
        </div>
        <div class="layer layer-glass"></div>
        <div class="layer layer-ui">
          <div class="header">
            <h2 class="title">Cache Node</h2>
          </div>
          <p class="desc">In-memory state.</p>
          <div class="metrics" style="margin-top: 15px;">
            <div class="metric"><span class="metric-val">99.8%</span><span class="metric-label">Hit Rate</span></div>
          </div>
        </div>
      </div>

      <div class="component comp-node-2">
        <div class="layer layer-base"></div>
        <div class="layer layer-core">
          <svg class="core-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"></path>
            <polyline points="15 13 18 16 21 13"></polyline>
            <line x1="18" y1="16" x2="18" y2="10"></line>
          </svg>
        </div>
        <div class="layer layer-glass"></div>
        <div class="layer layer-ui">
          <div class="header">
            <h2 class="title">Edge Proxy</h2>
          </div>
          <p class="desc">Global routing.</p>
          <div class="metrics" style="margin-top: 15px;">
            <div class="metric"><span class="metric-val">12ms</span><span class="metric-label">Ping</span></div>
          </div>
        </div>
      </div>

    </div>
  </div>

</body>
</html>
